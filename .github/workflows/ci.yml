# CI: backend pytest + frontend Vitest on push/PR
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: wip_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_ENV

      - name: Install backend deps
        working-directory: src
        run: poetry install

      - name: Run pytest
        working-directory: src
        env:
          DJANGO_SETTINGS_MODULE: wizerproperties.settings.test
          WIZER_USE_POSTGRES_TESTS: "1"
          DB_NAME: wip_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
        run: poetry run pytest --cov -q

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps and run Vitest
        run: npm ci && npm run test
