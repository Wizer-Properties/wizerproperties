# Docker: build image on push to main/master. Optional push to registry if secrets set.
name: Docker

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: false
          load: true
          tags: wizerproperties:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

