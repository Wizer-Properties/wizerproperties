<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- for all -->
    <link rel="stylesheet" href="static/css/libraries/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/libraries/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/libraries/fontawesome-all.min.css">
    <link rel="stylesheet" href="static/css/style.css">


    <!-- for authentication page only -->
    <link rel="stylesheet" href="static/css/auth.css">
    
</head>
<body>

    <div class="container-fluid">
        <div class="row how-it-work-row">
            <div class="col-lg-8 login-form-box">
                <div class="logo">
                    <a href="/">
                        <img src="static/media/logo.png" alt="">
                    </a>
                </div>

                <!--- Login Form Start --->

                <div class="authArea">
                    <p>Create a New Password</p>
                    <div class="authForm">
                        <input type="password" id="fullNameInput" class="authInput" required>
                        <div class="authlabelline">Password</div><br><br>
                        <input type="password" id="fullNameInput" class="authInput" required>
                        <div class="authlabelline">Confirm Password</div><br><br>
                        <button type="button" class="authButton">Submit</button>
                    </div>
                    <div class="authIconDiv">
                        <a href="#"><i class="fa-brands fa-facebook authIcon"></i></a>
                        <a href="#"><i class="fa-brands fa-youtube authIcon"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram authIcon"></i></a>
                    </div>
                </div>    

                <!--- Login Form End --->

            </div>
            <div class="col-lg-4 login-des-box">
                <div class="authTextArea">
                    <p class="authTextAreaTitle">Already Have Account ?</p>
                    <p class="authTextAreaDescription">Login and enjoy a great amount of new features</p>
                    <a type="button" class="authSignUpButton">Login</a>
                    <a class="authTextForget" href="#">Forget Password ?</a>
                </div>    
            </div>
        </div>
    </div>                

    <script src="static/js/libraries/jquery.min.js"></script>
    <script src="static/js/libraries/fontawesome-all.min.js"></script>

    <script src="static/js/main.js"></script>
    <script src="static/js/utilities/input-fields.js"></script>

</body>
</html>
