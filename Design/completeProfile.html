<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- for all -->
    <link rel="stylesheet" href="static/css/libraries/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/libraries/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/libraries/fontawesome-all.min.css">
    <link rel="stylesheet" href="static/css/style.css">


    <!-- for authentication page only -->
    <link rel="stylesheet" href="static/css/auth.css">
    
</head>
<body>

    <div class="container-fluid">
        <div class="row how-it-work-row">
            <div class="col-lg-8 order-lg-2 login-form-box">
                <div class="logo completeProfileLogo">
                    <a href="/">
                        <img src="static/media/logo.png" alt="">
                    </a>
                </div>

                <!--- Login Form Start --->

                <div class="authArea completeProfileArea">
                    <p>Complete Your Profile</p>
                    <div class="authForm">
                        <div>
                            <!-- <span class="authSuccessMessage">Success Message</span> -->
                        </div>
                        <div class="authFormDiv">   
                            <!-- <span class="authErrorMessage">Message</span> -->
                            <input type="file" class="authInput authFile" required>
                            <div class="fileName"> Company Logo</div>
                        </div>
                        <div class="authFormDiv">   
                            <!-- <span class="authErrorMessage">Message</span> -->
                            <input type="text" class="authInput" required placeholder="Company Name">
                            <div class="authlabelline authcompleteProfileLabe">Company Name</div> 
                        </div>
                        <div class="d-flex">
                            <div class="phone_code_area">
                                <div class="authFormDiv">
                                    <!-- <span class="authErrorMessage">Message</span> -->
                                    <select name="phone_code" type="text" id="phone_code" class="authInput authSelectInput" placeholder="Code" required>
                                        <option value="male">+66</option>
                                    </select>
                                </div>
                            </div>
                    
                            <div class="phone_number_area">
                                <div class="authFormDiv">
                                    <!-- <span class="authErrorMessage">Message</span> -->
                                    <input name="phone_number" type="tel" class="authInput" placeholder="Phone Number" required>
                                    <div class="authlabelline authcompleteProfileLabe">Phone Number</div>
                                </div>
                            </div>
                        </div>
                        <div class="authFormDiv">   
                            <!-- <span class="authErrorMessage">Message</span> -->
                            <input type="text" required class="authInput" placeholder="Company Address">
                            <div class="authlabelline authcompleteProfileLabe">Company Address</div> 
                        </div>
                        <div class="authFormDiv">   
                            <!-- <span class="authErrorMessage">Message</span> -->
                            <textarea type="text" id="emailInput" required class="authInput profileCompanyDeatils" placeholder="Company Details"></textarea>
                            <div class="authlabelline authcompleteProfileLabe">Company Details</div> 
                        </div>
                        <button type="button" class="authButton completeProfileButton">Complete Profile</button>
                    </div>
                </div>    

                <!--- Login Form End --->

            </div>
            <div class="col-lg-4 order-lg-1 login-des-box">
                <div class="authTextArea">
                    <p class="authTextAreaTitle">Complete Your Account</p>
                    <p class="authTextAreaDescription">Ensure you fill out the form with correct information.</p>
                    <a type="button" class="authSignUpButton">Logout</a>
                    <a class="authTextForget" href="#">Forget Password ?</a>
                </div>    
            </div>
        </div>
    </div>                

    <script src="static/js/libraries/jquery.min.js"></script>
    <script src="static/js/libraries/fontawesome-all.min.js"></script>

    <script src="static/js/main.js"></script>
    <script src="static/js/utilities/input-fields.js"></script>

    <script type="text/javascript">
        console.log("Hello world")
        $('.authFile').change(function(){

        $(this).parents('[respons="error"]').attr('respons','');

        console.log($(this).parents('[respons="error"]'))
        try{
            $('.fileName').text($(this)[0].files[0].name);
            $('.fileName').attr('add-file','true');
            
        }catch{
            $('.fileName').text('Select input');
            $('.fileName').attr('add-file','false');
        }
    });
    </script>

</body>
</html>
