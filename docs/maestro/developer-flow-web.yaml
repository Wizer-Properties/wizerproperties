appId: web
# Django web application test configuration
# Server-side rendered templates with Tailwind CSS frontend

---
# Developer Flow Test - Web Version
# Optimized for web application testing

- launchApp

# Navigate to login page
- openLink: "${BASE_URL:-http://localhost:8000}/user/login/"
- waitForAnimationToEnd

# Verify login page loaded
- waitForAnimationToEnd
- assertVisible:
    text: "Sign in"

# Fill login form
- tapOn:
    id: "email"
    optional: true
- inputText: "${DEVELOPER_EMAIL}"
- tapOn:
    id: "password"
    optional: true
- inputText: "${DEVELOPER_PASSWORD}"

# Submit login form
- tapOn:
    id: "log-in-button"
    optional: true
- tapOn:
    text: "Log in"
    optional: true
- waitForAnimationToEnd

# Verify successful login - check for dashboard or redirect
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"
    optional: true

# Navigate to dashboard if not already there
- openLink: "${BASE_URL:-http://localhost:8000}/dashboard/"
- waitForAnimationToEnd

# Verify dashboard statistics
- assertVisible:
    text: "Buildings"
    optional: true
- assertVisible:
    text: "Properties"
    optional: true
- assertVisible:
    text: "Active Properties"
    optional: true

# Navigate to developer property list
- openLink: "${BASE_URL:-http://localhost:8000}/property/list/${DEVELOPER_USER_ID}/"
- waitForAnimationToEnd

# Verify property list page elements
- waitForAnimationToEnd
- assertVisible:
    text: "Your Property Listings"
    optional: true
- assertVisible:
    text: "Add new listing"
    optional: true

# Test property list interactions
- scroll
- waitForAnimationToEnd

# Check if properties are displayed or empty state
- waitForAnimationToEnd
- assertVisible:
    text: "No listings found"
    optional: true

# Navigate to create property page
- tapOn:
    text: "Add new listing"
    optional: true
- waitForAnimationToEnd

# Verify create property form
- waitForAnimationToEnd
- assertVisible:
    text: "Create"
    optional: true

# Navigate back to dashboard
- openLink: "${BASE_URL:-http://localhost:8000}/dashboard/"
- waitForAnimationToEnd

# Verify dashboard tables
- scroll
- waitForAnimationToEnd
- assertVisible:
    text: "Properties"
    optional: true

# Test logout
- openLink: "${BASE_URL:-http://localhost:8000}/user/logout/"
- waitForAnimationToEnd

# Verify logged out
- waitForAnimationToEnd
- assertVisible:
    text: "Sign in"
    optional: true
