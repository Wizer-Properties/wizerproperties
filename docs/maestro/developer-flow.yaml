appId: web
# Django web application - uses server-side rendered templates with Tailwind CSS
# This is a web app, not a mobile app, so we use appId: web

---
# Developer Flow Test Suite
# This test suite covers the complete developer workflow including:
# - Authentication
# - Dashboard navigation
# - Property management
# - Property listing views

- launchApp

# Navigate to login page (Django web app)
- openLink: "${BASE_URL:-http://localhost:8000}/user/login/"
- waitForAnimationToEnd

# ============================================
# 1. AUTHENTICATION FLOW - Developer Login
# ============================================
- assertVisible: "Sign in"
- tapOn: "Sign in"
- assertVisible:
    text: "Email"
- inputText: "${DEVELOPER_EMAIL}"
- inputText: "${DEVELOPER_PASSWORD}"
- tapOn:
    text: "Log in"
    # Alternative selector if button has different text:
    # id: "log-in-button"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"
    optional: true

# ============================================
# 2. DASHBOARD NAVIGATION - View Developer Dashboard
# ============================================
- assertVisible:
    text: "Dashboard"
- assertVisible:
    text: "Buildings"
    optional: true
- assertVisible:
    text: "Properties"
    optional: true
- assertVisible:
    text: "Credit Balance"
    optional: true

# Verify statistics cards are visible
- assertVisible:
    text: "Active Properties"
    optional: true

# ============================================
# 3. PROPERTY LISTINGS VIEW - Navigate to Property Listings
# ============================================
# Navigate to developer property list (Django web app)
- openLink: "${BASE_URL:-http://localhost:8000}/property/list/${DEVELOPER_USER_ID}/"
- waitForAnimationToEnd
- assertVisible:
    text: "Your Property Listings"

# Verify property list elements
- assertVisible:
    text: "Portfolio"
    optional: true
- assertVisible:
    text: "Total listings"
    optional: true
- assertVisible:
    text: "Add new listing"
    optional: true

# ============================================
# 4. PROPERTY CARD INTERACTIONS - Interact with Property Cards
# ============================================
# Scroll to see property cards if they exist
- scroll
- scroll
- waitForAnimationToEnd

# Check if properties are loaded
- waitForAnimationToEnd
- assertVisible:
    text: "No listings found"
    optional: true

# If properties exist, interact with first property card
- tapOn:
    text: ".*"
    index: 0
    optional: true
- waitForAnimationToEnd

# ============================================
# 5. CREATE NEW PROPERTY - Navigate to Create Property
# ============================================
- back
- waitForAnimationToEnd
- tapOn:
    text: "Add new listing"
    optional: true
- waitForAnimationToEnd

# Verify create property form
- waitForAnimationToEnd
- assertVisible:
    text: "Create"
    optional: true
- assertVisible:
    text: "Title"
    optional: true
- back

# ============================================
# 6. DASHBOARD PROPERTY MANAGEMENT - Manage Properties from Dashboard
# ============================================
# Navigate back to dashboard (Django web app)
- openLink: "${BASE_URL:-http://localhost:8000}/dashboard/"
- waitForAnimationToEnd
- assertVisible:
    text: "Properties"

# Scroll to properties table
- scroll
- waitForAnimationToEnd

# Look for property table
- assertVisible:
    text: "ID"
    optional: true
- assertVisible:
    text: "Title"
    optional: true
- assertVisible:
    text: "Active"
    optional: true

# ============================================
# 7. TOGGLE PROPERTY ACTIVE STATUS - Toggle Property Active Status
# ============================================
# Find and toggle first property's active status
- tapOn:
    id: "toggle-active"
    index: 0
    optional: true
- waitForAnimationToEnd

# Verify toggle worked (check for success message or state change)
- waitForAnimationToEnd
- assertVisible:
    text: ".*"
    optional: true

# ============================================
# 8. VIEW PROPERTY DETAILS - View Property Details
# ============================================
# Navigate to property details if available
- tapOn:
    text: "View"
    index: 0
    optional: true
- waitForAnimationToEnd

# Verify property detail page elements
- waitForAnimationToEnd
- assertVisible:
    text: ".*"
    optional: true
- scroll
- waitForAnimationToEnd

# Navigate back
- back
- waitForAnimationToEnd

# ============================================
# 9. SEARCH AND FILTER PROPERTIES - Search Properties
# ============================================
# Navigate to property search (Django web app)
- openLink: "${BASE_URL:-http://localhost:8000}/property/search/"
- waitForAnimationToEnd
- assertVisible:
    text: "Search"
    optional: true

# Interact with search filters if available
- tapOn:
    text: "Filter"
    optional: true
- waitForAnimationToEnd

# Close filter panel
- back
- waitForAnimationToEnd

# ============================================
# 10. LOGOUT - Developer Logout
# ============================================
# Navigate to logout (Django web app)
- openLink: "${BASE_URL:-http://localhost:8000}/user/logout/"
- waitForAnimationToEnd

# Verify logged out
- waitForAnimationToEnd
- assertVisible:
    text: "Sign in"
    optional: true
