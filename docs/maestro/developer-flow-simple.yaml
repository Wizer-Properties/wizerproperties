appId: web
# Simplified developer flow test - good for quick smoke tests
# Django web application - server-side rendered with Tailwind CSS

---
# Simple Developer Flow Test
# This is a minimal test that covers the essential developer workflow

- launchApp

# Navigate to login page (for web testing)
- openLink: "${BASE_URL:-http://localhost:8000}/user/login/"
- waitForAnimationToEnd

# Login
- assertVisible: "Sign in"
- tapOn: "Sign in"
- inputText: "${DEVELOPER_EMAIL}"
- inputText: "${DEVELOPER_PASSWORD}"
- tapOn:
    text: "Log in"
- waitForAnimationToEnd

# Verify dashboard loaded
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Verify key dashboard elements
- assertVisible:
    text: "Properties"
    optional: true
- assertVisible:
    text: "Buildings"
    optional: true

# Navigate to property list (for web testing)
- openLink: "${BASE_URL:-http://localhost:8000}/property/list/${DEVELOPER_USER_ID}/"
- waitForAnimationToEnd

# Verify property list page
- waitForAnimationToEnd
- assertVisible:
    text: "Your Property Listings"
    optional: true

# Take screenshot for verification
- takeScreenshot: "developer-property-list"

