{% extends "base.html" %}
{% load static %}
{% load widget_tweaks %}

{% block extend_head %}
<title>Profile settings</title>
<link rel="stylesheet" href="{% static '/css/auth.css' %}" />
<style>
    #loginButtonText {
        margin: 0;
        padding: 0;
        font-size: inherit;
    }
</style>
{% endblock extend_head %}

{% block content %}



<section id="profile-setting">
    <div class="container">
        <div class="col-lg-7 profile-setting-box">
            <div class="logo completeProfileLogo">
                <a href="/">
                    <img src="{% static 'media/logo.png' %}" alt="logo">
                </a>
            </div>

            <form id="profile-form" method="post">
                {% csrf_token %}
                {% block profile %}
                {% endblock %}
            </form>
        </div>
    </div>
</section>
{% endblock %}
