{% extends "auth/profile_settings.html" %}
{% load static %}

{% block profile %}

<!--- Complete Profile Form Start --->

<div class="authForm">
    <div class="success-message">
        <!-- <span class="authSuccessMessage"></span> -->
    </div>
    <div class="error-message">
        <!-- <span class="authErrorMessage"></span> -->
    </div>
    {% if profile.company_logo %}
    <div class="companyLogoDiv">
        <img src="{{ profile.company_logo.url }}" alt="Company Logo" style="max-width: 200px;">
    </div>
    {% endif %}
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="company_logo" type="file" accept="image/*" class="authInput authFile">
        <div class="fileName"> Company Logo</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="email" type="email" class="authInput" placeholder="Email" value="{{ request.user.email }}" readonly>
        <div class="authlabelline authcompleteProfileLabe">Email</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="company_name" type="text" class="authInput" placeholder="Company Name" value="{{ profile.company_name }}" required>
        <div class="authlabelline authcompleteProfileLabe">Company Name</div>
    </div>
    <div class="d-flex">
        <div class="phone_code_area">
            <div class="authFormDiv">
                <!-- <span class="authErrorMessage">Message</span> -->
                <select name="phone_code" type="text" id="phone_code" class="authInput authSelectInput" placeholder="Code" required>
                    <option value="+66">+66</option>
                </select>
            </div>
        </div>

        <div class="phone_number_area">
            <div class="authFormDiv">
                <!-- <span class="authErrorMessage">Message</span> -->
                <input name="phone_number" type="tel" class="authInput" placeholder="Phone Number" value="{{ profile.phone_number|cut:'+66' }}" required>
                <div class="authlabelline authcompleteProfileLabe">Phone Number</div>
            </div>
        </div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="whats_app_link" type="text" class="authInput" placeholder="WhatsApp Link" value="{{ profile.whats_app_link }}">
        <div class="authlabelline authcompleteProfileLabe">WhatsApp Link</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="line_link" type="text" class="authInput" placeholder="Line Link" value="{{ profile.line_link }}">
        <div class="authlabelline authcompleteProfileLabe">Line Link</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="we_chat_link" type="text" class="authInput" placeholder="WeChat Link" value="{{ profile.we_chat_link }}">
        <div class="authlabelline authcompleteProfileLabe">WeChat Link</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="company_address" type="text" class="authInput pac-input" placeholder="Company Address" value="{{ profile.company_address }}" required>
        <div class="authlabelline authcompleteProfileLabe">Company Address</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <textarea name="company_details" type="text" id="emailInput" class="authInput profileCompanyDeatils"
            placeholder="Company Details" required>{{ profile.company_details }}</textarea>
        <div class="authlabelline authcompleteProfileLabe">Company Details</div>
    </div>
    <button type="submit" class="authButton completeProfileButton">
        <span id="loginButtonText">Update Profile</span>
        <div id="loadingSpinner" class="spinner-border" role="status" style="display: none;">
            <span class="sr-only">Loading...</span>
        </div>
    </button>
</div>

<!--- Complete Profile Form End --->

{% endblock %}
