{% extends "auth/complete_profile.html" %}
{% load static %}

{% block profile %}

<!--- Complete Profile Form Start --->

<div class="success-message">
    <!-- <span class="authSuccessMessage"></span> -->
</div>
<div class="error-message">
    <!-- <span class="authErrorMessage"></span> -->
</div>

<div class="auth-input-wrapper">
    <label>User email</label>
    <input type="email" name="email" value="{{ request.user.email }}" readonly>
</div>

<div class="auth-input-wrapper">
    <label>First Name</label>
    <input type="text" name="first_name" placeholder="First Name" required>
</div>

<div class="auth-input-wrapper">
    <label>Last Name</label>
    <input type="text" name="last_name" placeholder="Last Name" required>
</div>

<div class="auth-input-wrapper">
    <label>Phone Number</label>

    <div class="d-flex gap-2">
        <select name="phone_code" placeholder="Code" required style="width: 100px;">
            <option value="+66">+66</option>
        </select>
        <input type="tel" name="phone_number" placeholder="Phone Number" required>
    </div>
</div>

<div class="auth-input-wrapper">
    <label>Gender</label>

    <select name="gender" placeholder="Gender" required>
        <option value="">........</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>
</div>

<div class="auth-input-wrapper">
    <label>Address</label>
    <input type="text" name="address" class="pac-input" placeholder="Address" required>
</div>
<input name="latitude" label="latitude" label-name="latitude" type="text" class="authInput" placeholder="Latitude">
<input name="longitude" label="longitude" label-name="longitude" type="text" class="authInput" placeholder="Longitude">

<div class="auth-response-messages"></div>
<button type="submit" class="auth-form-btn" button-name="complete-profile">
    Complete Profile
</button>

<!--- Complete Profile Form End --->

{% endblock %}
