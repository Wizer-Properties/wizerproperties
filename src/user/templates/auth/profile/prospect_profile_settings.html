{% extends "auth/profile_settings.html" %}
{% load static %}

{% block profile %}

<!--- Complete Profile Form Start --->

<div class="authForm">
    <div class="success-message">
        <!-- <span class="authSuccessMessage"></span> -->
    </div>
    <div class="error-message">
        <!-- <span class="authErrorMessage"></span> -->
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="email" type="email" class="authInput" placeholder="Email" value="{{ request.user.email }}"
            readonly>
        <div class="authlabelline authcompleteProfileLabe">Email</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="first_name" type="text" class="authInput" placeholder="First Name" value="{{ profile.first_name }}"
            required>
        <div class="authlabelline authcompleteProfileLabe">First Name</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="last_name" type="text" class="authInput" placeholder="Last Name" value="{{ profile.last_name }}"
            required>
        <div class="authlabelline authcompleteProfileLabe">Last Name</div>
    </div>

    <div class="d-flex">
        <div class="phone_code_area">
            <div class="authFormDiv">
                <!-- <span class="authErrorMessage">Message</span> -->
                <select name="phone_code" type="text" id="phone_code" class="authInput authSelectInput"
                    placeholder="Code" required>
                    <option value="+66">+66</option>
                </select>
            </div>
        </div>

        <div class="phone_number_area">
            <div class="authFormDiv">
                <!-- <span class="authErrorMessage">Message</span> -->
                <input name="phone_number" type="tel" class="authInput" placeholder="Phone Number"
                    value="{{ profile.phone_number|cut:'+66' }}" required>
                <div class="authlabelline authcompleteProfileLabe">Phone Number</div>
            </div>
        </div>
    </div>

    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <select name="gender" type="text" id="emailInput" class="authInput authSelectInput" placeholder="Gender"
            required>
            <option value="">........</option>
            <option value="male" {% if profile.gender == 'male' %}selected{% endif %}>Male</option>
            <option value="female" {% if profile.gender == 'female' %}selected{% endif %}>Female</option>
        </select>
        <div class="authlabelline authcompleteProfileLabe">Gender</div>
    </div>
    <div class="authFormDiv">
        <!-- <span class="authErrorMessage">Message</span> -->
        <input name="address" type="text" class="authInput pac-input" placeholder="Address" value="{{ profile.address }}"
            required>
        <div class="authlabelline authcompleteProfileLabe">Address</div>
    </div>
    <input name="latitude" label="latitude" label-name="latitude" type="text" class="authInput" placeholder="Latitude">
    <input name="longitude" label="longitude" label-name="longitude" type="text" class="authInput" placeholder="Longitude">

    <button type="submit" class="authButton completeProfileButton">
        <span id="loginButtonText">Update Profile</span>
        <div id="loadingSpinner" class="spinner-border" role="status" style="display: none;">
            <span class="sr-only">Loading...</span>
        </div>
    </button>
</div>

<!--- Complete Profile Form End --->

{% endblock %}
