{% extends "admin/change_list.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}
    <!-- Local CSS -->
    <link rel="stylesheet" href="{% static 'css/libraries/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/libraries/bootstrap-icons.css' %}" />

    <script>
      function propertyInformationURL(propertyID) {
        var url = "{% url 'property:api:property_info' 99999 %}";
        return url.replace("99999", propertyID);
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="{% static 'js/libraries/jquery.min.js' %}"></script>
    <script src="{% static 'js/property/admin-property-info.js' %}?v=1.01"></script>

    <style>
        h1 {
            margin: 0 0 20px;
            font-weight: 300;
            font-size: 1.25rem;
            color: var(--body-quiet-color);
        }
    </style>
{% endblock %}

{% block content %}
    {{ block.super }}

    <div class="modal fade bd-example-modal-lg" id="property-modal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title text-center" id="confirmationModalLabel">Property Information</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body row">
              <div class="col-md-6 left-part"></div>
              <div class="col-md-6 right-part"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-info text-white" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>

{% endblock %}
