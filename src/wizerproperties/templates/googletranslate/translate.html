<!-- google translate -->
<div id="google_translate_element" class="hidden"></div>
<div class="relative inline-flex items-center" data-translate>
    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-card/70 px-3 py-1.5 text-sm font-medium text-foreground shadow-sm transition hover:bg-card focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2" data-translate-trigger aria-haspopup="listbox" aria-expanded="false">
        <i class="bi bi-globe text-base text-muted-foreground"></i>
        <span class="notranslate" data-translate-label>EN</span>
        <svg class="size-3 text-muted-foreground" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 8l4 4 4-4" />
        </svg>
        <span class="sr-only">Select language</span>
    </button>
    <div class="absolute right-0 top-full z-40 mt-2 hidden min-w-[10rem] overflow-hidden rounded-xl border border-border bg-card/95 shadow-xl backdrop-blur" data-translate-menu>
        <ul class="flex flex-col py-1 text-sm font-medium text-foreground" role="listbox" aria-labelledby="custom_translate_dropdown">
            <li>
                <button type="button" class="translate-option w-full px-3 py-2 text-left transition hover:bg-muted/70" data-language="/en/en" role="option">
                    <span class="notranslate">English</span>
                </button>
            </li>
            <li>
                <button type="button" class="translate-option w-full px-3 py-2 text-left transition hover:bg-muted/70" data-language="/en/th" role="option">
                    <span class="notranslate">Thai</span>
                </button>
            </li>
            <li>
                <button type="button" class="translate-option w-full px-3 py-2 text-left transition hover:bg-muted/70" data-language="/en/zh-CN" role="option">
                    <span class="notranslate">Chinese</span>
                </button>
            </li>
        </ul>
    </div>
</div>
