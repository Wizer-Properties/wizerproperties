{% load static %} {% load widget_tweaks %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- for all -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/libraries/bootstrap-icons.css' %}" />
    <link rel="stylesheet" href="{% static 'css/libraries/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/libraries/fontawesome-all.min.css' %}" />

    {% block extend_head %}{% endblock extend_head %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.00" />
    <link href = "https://fonts.googleapis.com/icon?family=Material+Icons" rel = "stylesheet">
</head>

<body>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>


<script src="{% static 'js/libraries/jquery.min.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script src="{% static 'js/libraries/fontawesome-all.min.js' %}"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="{% static 'js/main.js' %}?v=1.00"></script>



<script>
    var csrfToken = "{{ csrf_token }}"
</script>

{% block extend_script %}{% endblock extend_script %}

</html>
