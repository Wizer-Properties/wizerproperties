{% load static %}{% load widget_tweaks %}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="{% static 'media/icons/favicon.ico' %}" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}?v=1.00" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    {% block extend_head %}{% endblock extend_head %}
</head>

<body class="min-h-screen bg-[#f2f3f4] font-sans text-[#262637] antialiased">
    <main class="min-h-screen bg-[#f2f3f4] py-8 px-4 sm:px-6 lg:px-8">
        <div class="mx-auto max-w-7xl">
                    {% block content %}{% endblock %}
                </div>
    </main>

    <footer class="mt-12 text-center text-xs text-[#53535fcc]">
                <p>
            © {% now "Y" %} Wizer Properties — Developed by
            <a href="https://vaid.tech" target="_blank" rel="noreferrer" class="font-medium text-[#00deb6] underline decoration-dotted underline-offset-4 transition hover:text-[#00deb6]/80">
                        Vaidtech
                    </a>
                </p>
            </footer>

    <script>
        var csrfToken = "{{ csrf_token }}";
    </script>
    <script src="{% static 'js/libraries/jquery.min.js' %}"></script>
    {% block extend_script %}{% endblock extend_script %}
</body>

</html>
