[pytest]
DJANGO_SETTINGS_MODULE = wizerproperties.settings.test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --reuse-db
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    -v
testpaths = 
    property
    building
    user
    blog
    schedule
    advertise
    core
    ipdata
    utils
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    django_db: marks tests as requiring database access
# Coverage: .coveragerc (fail_under=85). Target 85%. Use Postgres (WIZER_USE_POSTGRES_TESTS=1) for full suite; SQLite runs a subset and may error on django_db tests.
