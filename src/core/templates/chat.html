{% load static %}

<section id="home-helper-ai" class="bg-white py-16">
    <div class="container max-w-7xl space-y-10">
        <div class="space-y-3 text-center">
            <span class="inline-flex items-center gap-2 rounded-full bg-accent/10 px-6 py-2 text-sm font-semibold uppercase tracking-[0.3em] text-brand-purple">Home Helper AI</span>
        </div>

        <div class="rounded-3xl border border-border bg-card shadow-lg">
            <div class="h-[360px] overflow-y-auto border-b border-border" data-chat-history>
                <div class="p-6">
                    <ul class="flex flex-col gap-4 text-sm text-foreground" data-chat-messages>
                        <li class="text-center text-base text-muted-foreground" data-chat-empty>
                            Ask anything about buying property in Bangkok or search for properties matching your criteria. We'll give you instant, accurate answers and show you relevant listings. Try a question below or type your own.
                        </li>
                    </ul>
                    
                    <div class="space-y-4 mt-6" data-chat-prompts-container>
                        <div class="space-y-3">
                            <p class="text-xs font-semibold text-muted-foreground uppercase tracking-wide">Find Properties</p>
                            <div class="flex flex-wrap gap-2" data-chat-prompts>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    Show me condos under 5 million baht
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    Find 2-bedroom properties in Sukhumvit
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    Show me newest condos near BTS stations
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    Find villas between 10-20 million baht
                                </button>
                            </div>
                        </div>
                        
                        <div class="space-y-3">
                            <p class="text-xs font-semibold text-muted-foreground uppercase tracking-wide">Property Questions</p>
                            <div class="flex flex-wrap gap-2" data-chat-prompts>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    Can foreigners own condos in Bangkok?
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    What documents do I need to buy as a foreigner?
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    How do payment plans work for off-plan condos?
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    What developer incentives can I get?
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    What are hidden fees when buying property?
                                </button>
                                <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/50 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-chat-prompt>
                                    Can I get a mortgage as a foreigner?
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6">
                <form class="space-y-3" data-chat-form>
                    <div class="flex items-end gap-3">
                        <div class="flex-1">
                            <label for="home-helper-input" class="sr-only">Ask Home Helper AI</label>
                            <textarea id="home-helper-input" rows="1" class="input min-h-[48px] resize-none" placeholder="" data-chat-input></textarea>
                        </div>
                        <button type="submit" class="btn bg-primary text-white hover:bg-primary/90 focus-visible:outline-primary" data-chat-send>
                            <i class="bi bi-send"></i>
                            <span class="sr-only">Send</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
