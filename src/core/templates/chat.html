{% load static %}

<section id="home-helper-ai" class="py-16" style="background: linear-gradient(180deg, hsla(177,80%,42%,0.06) 0%, hsla(304,74%,29%,0.04) 100%);">
    <div class="container max-w-7xl space-y-6">
        <div class="space-y-3 text-center">
            <span class="inline-flex items-center gap-2 rounded-full bg-accent/10 px-6 py-2 text-sm font-semibold uppercase tracking-[0.3em] text-brand-purple whitespace-nowrap">
                <svg class="h-3.5 w-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.6L19 9l-5.4 1.4L12 16l-1.6-5.6L5 9l5.4-1.4z"/></svg>
                Home Helper AI
            </span>
            <p class="text-sm text-muted-foreground">Ask about neighborhoods, pricing, ownership rules, or search for a property</p>
        </div>

        <div class="rounded-3xl border border-accent/15 bg-card shadow-[0_20px_40px_-12px_rgba(127,19,119,0.12)]">
            <div class="overflow-y-auto border-b border-border" style="height: 80px;" data-chat-history>
                <div class="h-full p-6">
                    <ul class="flex h-full flex-col gap-4 text-sm text-foreground" data-chat-messages>
                        <li class="flex h-full items-center justify-center gap-2 text-center text-sm text-muted-foreground" data-chat-empty>
                            <svg class="h-4 w-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
                            Start a conversation...
                        </li>
                    </ul>
                </div>
            </div>

            <div class="p-6">
                <form data-chat-form>
                    <div class="flex items-center gap-2 rounded-full border border-border bg-white pl-6 pr-2 py-2 transition-colors focus-within:border-brand-purple">
                        <label for="home-helper-input" class="sr-only">Ask Home Helper AI</label>
                        <textarea id="home-helper-input" rows="1" class="flex-1 resize-none border-none bg-transparent py-2 text-sm outline-none placeholder:text-muted-foreground" placeholder="Ask our AI your property related questions" data-chat-input></textarea>
                        <button type="submit" class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-brand-purple text-white transition hover:bg-brand-purple/90" data-chat-send>
                            <i class="bi bi-send"></i>
                            <span class="sr-only">Send</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
