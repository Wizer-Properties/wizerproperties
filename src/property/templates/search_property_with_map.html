{% extends "base.html" %}
{% load static %}
{% load widget_tweaks %}

{% block extend_head %}
<title>Search property</title>

<link rel="stylesheet" href="{% static '/css/search-page.css' %}?v=1.00" />

<style>
    .property-search-map-detail-modal{
        background-color: transparent !important;
        backdrop-filter: none !important;
        position: absolute !important;
        width: 400px !important;
    }
</style>
{% endblock extend_head %}

{% block content %}

<section class="filter-box mb-2">
    <div class="w-100 px-5">
        <div class="filter-categories">

            <div class="filter-categories-dropdown" label="Area">
                <button class="filter-dropdown-btn">
                    Area
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-buttons area-filter-buttons">
                        <button name="nearby" value="2">+ 2 miles</button>
                        <button name="nearby" value="5">+ 5 miles</button>
                        <button name="nearby" value="10">+ 10 miles</button>
                        <button name="nearby" value="15">+ 15 miles</button>
                        <button name="nearby" value="20">+ 20 miles</button>
                        <button name="nearby" value="30">+ 30 miles</button>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown" label="price">
                <button class="filter-dropdown-btn">
                    Any Price 
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="range-area">
                        <select name="min_price">
                            <option value="null">Min</option>
                            <option value="500000"> ฿ 500,000</option>
                            <option value="1000000"> ฿ 1,000,000</option>
                            <option value="1500000"> ฿ 1,500,000</option>
                            <option value="2000000"> ฿ 2,000,000</option>
                            <option value="2500000"> ฿ 2,500,000</option>
                            <option value="3000000"> ฿ 3,000,000</option>
                        </select>
                        <i class="bi bi-dash"></i>
                        <select name="max_price">
                            <option value="null">Max</option>
                            <option value="500000"> ฿ 500,000</option>
                            <option value="1000000"> ฿ 1,000,000</option>
                            <option value="1500000"> ฿ 1,500,000</option>
                            <option value="2000000"> ฿ 2,000,000</option>
                            <option value="2500000"> ฿ 2,500,000</option>
                            <option value="3000000"> ฿ 3,000,000</option>
                            <option value="3500000"> ฿ 3,500,000</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown" label="unit_area">
                <button class="filter-dropdown-btn">
                    Unit Area
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="range-area">
                        <select name="min_unit_area">
                            <option value="null">Min</option>
                            <option value="100"> 100 SqM</option>
                            <option value="200"> 200 SqM</option>
                            <option value="300"> 300 SqM</option>
                            <option value="400"> 400 SqM</option>
                            <option value="500"> 500 SqM</option>
                        </select>
                        <i class="bi bi-dash"></i>
                        <select name="max_unit_area">
                            <option value="null">Min</option>
                            <option value="100"> 100 SqM</option>
                            <option value="200"> 200 SqM</option>
                            <option value="300"> 300 SqM</option>
                            <option value="400"> 400 SqM</option>
                            <option value="500"> 500 SqM</option>
                            <option value="600"> 600 SqM</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown" label="Beds">
                <button class="filter-dropdown-btn">
                    Beds
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-buttons">
                        <button name="number_of_bedroom" value="null" active="true">Any</button>
                        <button name="number_of_bedroom" value="1">1</button>
                        <button name="number_of_bedroom" value="2">2</button>
                        <button name="number_of_bedroom" value="3">3</button>
                        <button name="number_of_bedroom" value="4">4</button>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown" label="Baths">
                <button class="filter-dropdown-btn">
                    Baths
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-buttons">
                        <button name="number_of_bathroom" value="null" active="true">Any</button>
                        <button name="number_of_bathroom" value="1">1</button>
                        <button name="number_of_bathroom" value="2">2</button>
                        <button name="number_of_bathroom" value="3">3</button>
                        <button name="number_of_bathroom" value="4">4</button>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown">
                <button class="filter-dropdown-btn">
                    Property Type
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-mtl-buttons" name="property-type">
                        <button name="building__type" value="condos">Condos</button>
                        <button name="building__type" value="house">House</button>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown">
                <button class="filter-dropdown-btn">
                    Property Quota
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-mtl-buttons" name="property-quota">
                        <button name="building__quota" value="thai">Thai</button>
                        <button name="building__quota" value="foreign">Foreign</button>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown">
                <button class="filter-dropdown-btn">
                    Property Furnishing
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-mtl-buttons" name="property-furnishing">
                        <button name="building__furnishing" value="partly">Partly</button>
                        <button name="building__furnishing" value="fully">Fully</button>
                    </div>
                </div>
            </div>

            <div class="filter-categories-dropdown">
                <button class="filter-dropdown-btn">
                    Features
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="filter-dropdown-field">
                    <div class="filter-dropdown-mtl-buttons" name="features">
                        <button value="building__have_sauna">Sauna</button>
                        <button value="building__have_guard_house">Guard house</button>
                        <button value="building__have_river_view">River view</button>
                        <button value="building__have_fitness_area">GYM</button>
                        <button value="building__have_sky_lounge">Sky lounge</button>
                        <button value="building__have_grocery">Grocery</button>
                    </div>
                </div>
            </div>

            <button class="reset-btn">
                Reset Search
            </button>
        </div>
    </div>
</section>

<section id="search-result">
    <div class="w-100">
        <div>
            <div id="search-map" style="width: 100%; height: 70vh;"></div>
        </div>
    </div>
</section>


<!-- detail modal -->
<div class="log-in-modal property-search-map-detail-modal">
    <div class="log-in-modal-overlay" log-modal-btn="close"></div>
    <div class="log-in-modal-body property-search-map-modal-body">
        <div class="detail-body"></div>
        <div class="nearby-items"></div>
    </div>
</div>

{% endblock %}


{% block extend_script %}
<script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
<script src="{% static '/js/property/search_with_map.js' %}?v=1.01"></script>
{% endblock extend_script %}
