{% load static %}
<template id="property-card-map-view-template">
  <article class="group relative flex w-full flex-col overflow-hidden rounded-xl border border-border/50 bg-card shadow-sm transition-all duration-300 hover:shadow-lg hover:border-accent/40 cursor-pointer" data-property-card>
    
    <!-- Featured Property Brand Color Accent Bar -->
    <div class="hidden h-1 bg-brand-teal" data-card-featured-accent></div>
    
    <!-- SECTION 1: Developer/Meta Info + Prominent CTA -->
    <div class="flex items-center justify-between gap-3 border-b border-border/50 bg-card px-4 py-2.5">
      <!-- Developer Info -->
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <div class="relative size-7 flex-shrink-0 overflow-hidden rounded-full border border-border bg-muted">
          <img src="{% static 'media/default-avatar.jpg' %}" alt="Developer" class="h-full w-full object-cover" data-card-developer-image />
          <div class="absolute inset-0 flex items-center justify-center bg-muted/80 hidden" data-card-developer-icon-fallback>
            <i class="bi bi-building text-[10px] text-muted-foreground"></i>
          </div>
        </div>
        <div class="min-w-0 flex-1">
          <p class="truncate text-xs font-semibold text-foreground" data-card-developer-name>Developer</p>
          <div class="flex items-center gap-1.5 text-[10px] text-muted-foreground">
            <p class="truncate" data-card-developer-company></p>
            <span class="text-muted-foreground/50">•</span>
            <p class="whitespace-nowrap" data-card-date-relative>
              <span data-card-date-label>Added</span> <span data-card-date-value>—</span>
            </p>
          </div>
        </div>
      </div>
      
      <!-- Meta Info: Price Only -->
      <div class="flex items-center gap-2 flex-shrink-0">
        <div class="text-right">
          <p class="text-base font-bold leading-none text-foreground sm:text-lg" data-card-price>฿ 0</p>
          <p class="text-[10px] font-medium text-muted-foreground mt-0.5" data-card-price-sqm>฿ 0 / sqm</p>
        </div>
      </div>
      
      <!-- Prominent CTA Button -->
      <a href="#" class="flex-shrink-0 inline-flex items-center justify-center gap-1.5 rounded-lg border-2 border-accent bg-accent px-3 py-1.5 text-[10px] font-bold text-white shadow-md transition-all hover:bg-accent/90 hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-accent/50 touch-manipulation min-h-[36px] sm:px-4 sm:py-2 sm:text-xs sm:min-h-[40px]" data-card-schedule>
        <i class="bi bi-calendar-check text-xs sm:text-sm"></i>
        <span class="hidden sm:inline">Book</span>
      </a>
    </div>
    
    <!-- SECTION 2: Images + Visual Meta Info -->
    <div class="relative aspect-[16/9] w-full overflow-hidden bg-gradient-to-br from-muted to-muted/50" data-card-image-section>
      <!-- Image Gallery -->
      <div class="splide h-full w-full" data-card-splide>
        <div class="splide__track">
          <ul class="splide__list" data-card-gallery></ul>
        </div>
      </div>
      
      <!-- Gradient Overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-black/0 to-black/0 pointer-events-none"></div>
      
      <!-- Top Bar: Badges + Actions -->
      <div class="absolute inset-x-0 top-0 z-20 flex items-start justify-between p-3">
        <!-- Badges (Left) -->
        <div class="flex flex-wrap gap-1.5" data-card-badges></div>
        
        <!-- Actions (Right) -->
        <div class="flex gap-1.5" data-card-actions>
          <button class="add-to-compare inline-flex size-8 items-center justify-center rounded-full bg-white/95 backdrop-blur-sm text-foreground shadow-lg transition-all hover:bg-white hover:scale-110 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-white/50 touch-manipulation" added="false" index="" effect="pulse" data-card-compare aria-label="Add to compare" title="Compare properties">
            <i class="bi bi-arrow-left-right text-xs"></i>
          </button>
          <button class="add-to-favorite inline-flex size-8 items-center justify-center rounded-full bg-white/95 backdrop-blur-sm text-foreground shadow-lg transition-all hover:bg-white hover:scale-110 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-white/50 touch-manipulation" added="false" index="" effect="pulse" data-card-favorite aria-label="Add to favorites" title="Save to favorites">
            <i class="bi bi-heart text-xs"></i>
          </button>
        </div>
      </div>
      
      <!-- Bottom Overlay: Title + Visual Info -->
      <div class="absolute inset-x-0 bottom-0 z-20 p-3 bg-gradient-to-t from-black/70 via-black/40 to-transparent">
        <a href="#" class="group/link block" data-card-link>
          <h3 class="line-clamp-2 text-base font-bold leading-tight text-white drop-shadow-lg mb-1 transition-colors group-hover/link:text-accent sm:text-lg" data-card-title>Property title</h3>
          <div class="flex items-center gap-1.5 text-xs text-white/90 drop-shadow sm:text-sm">
            <i class="bi bi-geo-alt-fill text-xs text-accent"></i>
            <span class="line-clamp-1" data-card-address>Address</span>
          </div>
        </a>
        
        <!-- View Buttons (3D Tour, Aerial, etc.) -->
        <div class="flex flex-wrap gap-1.5 mt-2" data-card-view-buttons>
          <!-- 3D Tour Badge -->
          <div class="hidden" data-card-3d-badge>
            <button type="button" class="inline-flex items-center gap-1.5 rounded-full border border-white/90 bg-white/95 backdrop-blur-md px-2.5 py-1 text-[10px] font-medium text-muted-foreground shadow-lg transition-all hover:bg-white hover:border-accent/60 hover:text-accent focus:outline-none focus:ring-2 focus:ring-white/50 touch-manipulation sm:px-3 sm:text-xs" data-card-3d>
              <i class="bi bi-box-arrow-up-right text-accent text-[10px] sm:text-xs"></i>
              <span>3D Tour</span>
            </button>
          </div>
          
          <!-- Aerial View Badge -->
          <div class="hidden" data-card-drone-badge>
            <button type="button" class="inline-flex items-center gap-1.5 rounded-full border border-white/90 bg-white/95 backdrop-blur-md px-2.5 py-1 text-[10px] font-medium text-muted-foreground shadow-lg transition-all hover:bg-white hover:border-accent/60 hover:text-accent focus:outline-none focus:ring-2 focus:ring-white/50 touch-manipulation sm:px-3 sm:text-xs" data-card-drone>
              <i class="bi bi-camera-video text-accent text-[10px] sm:text-xs"></i>
              <span>Aerial</span>
            </button>
          </div>
        </div>
      </div>
      
      <!-- Image Count Indicator -->
      <div class="absolute right-3 top-12 z-20 inline-flex items-center gap-1.5 rounded-full border border-white/30 bg-black/60 px-2 py-1 text-[10px] font-medium text-white backdrop-blur-md shadow-lg" data-card-image-count hidden>
        <i class="bi bi-images text-[10px]"></i>
        <span data-image-count-text>0</span>
      </div>
    </div>
    
    <!-- Property Stats Section: Icon + Text (Right under image) -->
    <div class="flex flex-wrap items-center gap-x-4 gap-y-2 border-b border-border/50 bg-card px-4 py-2.5">
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground flex-shrink-0">
        <i class="bi bi-bed text-accent text-sm"></i>
        <span class="font-bold text-foreground" data-card-beds>—</span>
        <span class="text-muted-foreground/70">bed</span>
      </div>
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground flex-shrink-0">
        <i class="bi bi-bathtub text-accent text-sm"></i>
        <span class="font-bold text-foreground" data-card-baths>—</span>
        <span class="text-muted-foreground/70">bath</span>
      </div>
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground flex-shrink-0">
        <i class="bi bi-rulers text-accent text-sm"></i>
        <span class="font-bold text-foreground" data-card-size-display>—</span>
        <span class="text-muted-foreground/70">sqft</span>
      </div>
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground hidden flex-shrink-0" data-card-floor-wrapper>
        <i class="bi bi-layers text-accent text-sm"></i>
        <span class="font-bold text-foreground" data-card-floor-number>—</span>
        <span class="text-muted-foreground/70">floor</span>
      </div>
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground hidden flex-shrink-0" data-card-parking-wrapper>
        <i class="bi bi-car-front text-accent text-sm"></i>
        <span class="font-bold text-foreground" data-card-parking>—</span>
        <span class="text-muted-foreground/70">parking</span>
      </div>
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground hidden min-w-0 flex-1" data-card-property-type-wrapper>
        <i class="bi bi-building text-accent text-sm flex-shrink-0"></i>
        <span class="font-bold text-foreground" data-card-property-type-stats>—</span>
      </div>
    </div>
    
    <!-- SECTION 3: Rest of Data (Icon + Text Format) -->
    <div class="flex flex-col gap-2 p-3 bg-card sm:p-4">
      <!-- Media & Action Buttons -->
      <div class="flex flex-wrap gap-1.5" data-card-media-buttons>
        <!-- These buttons will be populated via JavaScript based on available media -->
      </div>
      
      <!-- Additional Info Row -->
      <div class="flex flex-wrap items-center gap-2 text-[10px] text-muted-foreground sm:text-xs sm:gap-3">
        <div class="flex items-center gap-1.5">
          <i class="bi bi-tag text-accent text-[10px] sm:text-xs"></i>
          <span data-card-tag-display class="hidden font-medium"></span>
        </div>
      </div>
      
      <!-- Features Chips (if available) -->
      <div class="flex flex-wrap gap-1.5" data-card-features></div>
    </div>
  </article>
</template>
