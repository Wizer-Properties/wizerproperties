<template id="property-card-template">
  <article class="group relative overflow-hidden rounded-2xl border border-border bg-card shadow-sm transition hover:-translate-y-1 hover:shadow-lg" data-property-card>
    <div class="absolute left-4 top-4 z-10 flex flex-col gap-2" data-card-badges></div>
    <div class="absolute right-4 top-4 z-10 flex gap-2" data-card-actions>
      <button class="add-to-favorite inline-flex size-9 items-center justify-center rounded-full border border-border bg-black/60 text-white backdrop-blur transition hover:bg-black/80" added="false" index="" effect="pulse" data-card-favorite>
        <i class="bi bi-heart"></i>
        <span class="sr-only">Favorite</span>
      </button>
      <button class="add-to-compare inline-flex size-9 items-center justify-center rounded-full border border-border bg-black/60 text-white backdrop-blur transition hover:bg-black/80" added="false" index="" effect="pulse" data-card-compare>
        <i class="bi bi-arrow-left-right"></i>
        <span class="sr-only">Compare</span>
      </button>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-[320px_minmax(0,1fr)]">
      <div class="relative h-64 overflow-hidden bg-muted">
        <div class="splide h-full w-full" data-card-splide>
          <div class="splide__track">
            <ul class="splide__list" data-card-gallery></ul>
          </div>
        </div>
        <div class="absolute bottom-4 left-4 flex flex-col gap-2 rounded-xl border border-border bg-black/60 px-4 py-3 text-white backdrop-blur">
          <p class="text-xl font-semibold" data-card-price>฿ 0</p>
          <p class="text-xs text-muted-foreground" data-card-price-sqm>฿ 0 / sqm</p>
        </div>
      </div>
      <div class="flex flex-col justify-between gap-6 p-6">
        <div class="space-y-4">
          <a href="#" class="space-y-1" data-card-link>
            <h3 class="text-xl font-semibold text-foreground transition group-hover:text-primary" data-card-title>Property title</h3>
            <div class="flex items-center gap-2 text-sm text-muted-foreground">
              <i class="bi bi-geo-alt text-primary"></i>
              <span data-card-address>Address</span>
            </div>
          </a>
          <div class="grid grid-cols-2 gap-3 text-sm sm:grid-cols-4">
            <div class="flex flex-col items-center gap-1 rounded-lg border border-border bg-secondary/40 px-3 py-2">
              <i class="bi bi-bed text-primary"></i>
              <span class="font-semibold text-foreground" data-card-beds>—</span>
              <span class="text-xs text-muted-foreground">Beds</span>
            </div>
            <div class="flex flex-col items-center gap-1 rounded-lg border border-border bg-secondary/40 px-3 py-2">
              <i class="bi bi-bathtub text-primary"></i>
              <span class="font-semibold text-foreground" data-card-baths>—</span>
              <span class="text-xs text-muted-foreground">Baths</span>
            </div>
            <div class="flex flex-col items-center gap-1 rounded-lg border border-border bg-secondary/40 px-3 py-2">
              <i class="bi bi-rulers text-primary"></i>
              <span class="font-semibold text-foreground" data-card-size>— sqm</span>
              <span class="text-xs text-muted-foreground">Size</span>
            </div>
            <div class="flex flex-col items-center gap-1 rounded-lg border border-border bg-secondary/40 px-3 py-2">
              <i class="bi bi-building text-primary"></i>
              <span class="font-semibold text-foreground" data-card-floor>—</span>
              <span class="text-xs text-muted-foreground">Floor</span>
            </div>
          </div>
          <div class="flex flex-wrap gap-2" data-card-features></div>
          <div class="flex flex-wrap gap-2" data-card-action-buttons>
            <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary px-3 py-1 text-xs font-medium text-foreground transition hover:bg-secondary/60 hidden" data-card-3d>
              <i class="bi bi-box-arrow-up-right"></i>
              <span>Interior 3D View</span>
            </button>
            <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary px-3 py-1 text-xs font-medium text-foreground transition hover:bg-secondary/60 hidden" data-card-drone>
              <i class="bi bi-box-arrow-up-right"></i>
              <span>Aerial View</span>
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-4 border-t border-border pt-4 sm:flex-row sm:items-center sm:justify-between" data-card-footer>
          <div class="flex items-center gap-3">
            <div class="size-10 overflow-hidden rounded-full border border-border bg-muted">
              <img src="/static/media/default-avatar.jpg" alt="Developer" class="h-full w-full object-cover" data-card-developer-image />
            </div>
            <div class="text-sm">
              <p class="font-semibold text-foreground" data-card-developer-name>Developer</p>
              <p class="text-xs text-muted-foreground">Added: <span data-card-created>—</span></p>
            </div>
          </div>
          <div class="flex flex-wrap gap-2" data-card-ctas>
            <a href="#" class="inline-flex items-center gap-2 rounded-full border border-border bg-primary px-4 py-2 text-sm font-medium text-white transition hover:bg-primary/90" data-card-schedule>
              <i class="bi bi-calendar-check"></i>
              <span>Schedule viewing</span>
            </a>
            <a href="#" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary px-4 py-2 text-sm font-medium text-foreground transition hover:bg-secondary/60" data-card-contact>
              <i class="bi bi-envelope"></i>
              <span>Contact</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </article>
</template>
