{% load static %}

<section class="bg-muted/40 py-6" id="search-filter-box">
    <div class="container">
        <div class="space-y-6 rounded-2xl border border-border bg-card p-6 shadow-sm">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center">
                <div class="flex-1">
                    <label for="gm-search-input" class="sr-only">Search by location</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-muted-foreground">
                            <i class="bi bi-geo-alt text-lg"></i>
                        </span>
                        <input
                            id="gm-search-input"
                            type="text"
                            placeholder="Search by location"
                            class="input pl-11 pr-12"
                            autocomplete="off"
                        />
                        <button type="button" class="absolute inset-y-0 right-3 flex items-center text-muted-foreground transition hover:text-foreground" data-filter-clear-location>
                            <i class="bi bi-x-circle text-lg"></i>
                            <span class="sr-only">Clear location</span>
                        </button>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-3 text-sm text-muted-foreground">
                    <span>Active filters:</span>
                    <div class="flex flex-wrap gap-2" data-active-filter-chips>
                        <!-- Active filter chips inserted via JS -->
                    </div>
                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary px-3 py-1 text-xs font-medium text-foreground transition hover:border-primary/60 hover:text-primary" data-filter-reset>
                        <i class="bi bi-arrow-counterclockwise"></i>
                        <span>Reset all</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap gap-3" data-filter-trigger-group>
                <button type="button" data-filter-trigger="radius" aria-haspopup="true" aria-expanded="false" aria-controls="filter-popover-radius" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-4 py-2 text-sm font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary">
                    <i class="bi bi-radar"></i>
                    <span data-filter-label="radius">Radius</span>
                </button>
                <button type="button" data-filter-trigger="price" aria-haspopup="true" aria-expanded="false" aria-controls="filter-popover-price" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-4 py-2 text-sm font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary">
                    <i class="bi bi-tag"></i>
                    <span data-filter-label="price">Price</span>
                </button>
                <button type="button" data-filter-trigger="bedrooms" aria-haspopup="true" aria-expanded="false" aria-controls="filter-popover-bedrooms" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-4 py-2 text-sm font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary">
                    <i class="bi bi-bed"></i>
                    <span data-filter-label="bedrooms">Bedrooms</span>
                </button>
                <button type="button" data-filter-trigger="property-type" aria-haspopup="true" aria-expanded="false" aria-controls="filter-popover-property-type" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-4 py-2 text-sm font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary">
                    <i class="bi bi-building"></i>
                    <span data-filter-label="property-type">Property type</span>
                </button>
                <button type="button" data-filter-trigger="more" aria-haspopup="dialog" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-4 py-2 text-sm font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary">
                    <i class="bi bi-sliders"></i>
                    <span>More filters</span>
                </button>
            </div>

            <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3" data-filter-popovers>
                <div id="filter-popover-radius" data-filter-popover="radius" hidden class="space-y-4 rounded-2xl border border-border bg-popover p-5 shadow-lg" role="dialog" aria-modal="false" aria-labelledby="filter-popover-radius-title">
                    <div class="flex items-center justify-between">
                        <h3 id="filter-popover-radius-title" class="text-sm font-semibold text-foreground">Radius</h3>
                        <button type="button" class="inline-flex size-8 items-center justify-center rounded-full border border-border bg-secondary/60 text-muted-foreground transition hover:text-foreground" data-filter-close>
                            <i class="bi bi-x-lg text-xs"></i>
                            <span class="sr-only">Close radius filter</span>
                        </button>
                    </div>
                    <div class="space-y-3">
                        <label class="text-sm font-medium text-muted-foreground" for="filter-radius">Distance from search</label>
                        <select id="filter-radius" name="nearby" class="input" data-filter-input>
                            <option value="">Any distance</option>
                            <option value="0">Within 0 km</option>
                            <option value="2">Within 2 km</option>
                            <option value="5">Within 5 km</option>
                            <option value="10">Within 10 km</option>
                            <option value="15">Within 15 km</option>
                            <option value="20">Within 20 km</option>
                            <option value="30">Within 30 km</option>
                        </select>
                    </div>
                </div>

                <div id="filter-popover-price" data-filter-popover="price" hidden class="space-y-4 rounded-2xl border border-border bg-popover p-5 shadow-lg" role="dialog" aria-modal="false" aria-labelledby="filter-popover-price-title">
                    <div class="flex items-center justify-between">
                        <h3 id="filter-popover-price-title" class="text-sm font-semibold text-foreground">Price range</h3>
                        <button type="button" class="inline-flex size-8 items-center justify-center rounded-full border border-border bg-secondary/60 text-muted-foreground transition hover:text-foreground" data-filter-close>
                            <i class="bi bi-x-lg text-xs"></i>
                            <span class="sr-only">Close price filter</span>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                            <label class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Minimum</span>
                                <select name="min_price" class="input" data-filter-input>
                                    <option value="">Any price</option>
                                    <option value="500000">฿ 500,000</option>
                                    <option value="1000000">฿ 1,000,000</option>
                                    <option value="2000000">฿ 2,000,000</option>
                                    <option value="3000000">฿ 3,000,000</option>
                                    <option value="4000000">฿ 4,000,000</option>
                                    <option value="5000000">฿ 5,000,000</option>
                                    <option value="6000000">฿ 6,000,000</option>
                                    <option value="7000000">฿ 7,000,000</option>
                                    <option value="8000000">฿ 8,000,000</option>
                                    <option value="9000000">฿ 9,000,000</option>
                                    <option value="10000000">฿ 10,000,000</option>
                                    <option value="15000000">฿ 15,000,000</option>
                                    <option value="20000000">฿ 20,000,000</option>
                                    <option value="25000000">฿ 25,000,000</option>
                                    <option value="30000000">฿ 30,000,000</option>
                                    <option value="40000000">฿ 40,000,000</option>
                                    <option value="50000000">฿ 50,000,000</option>
                                    <option value="75000000">฿ 75,000,000</option>
                                    <option value="100000000">฿ 100,000,000</option>
                                </select>
                            </label>
                            <label class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Maximum</span>
                                <select name="max_price" class="input" data-filter-input>
                                    <option value="">Any price</option>
                                    <option value="500000">฿ 500,000</option>
                                    <option value="1000000">฿ 1,000,000</option>
                                    <option value="2000000">฿ 2,000,000</option>
                                    <option value="3000000">฿ 3,000,000</option>
                                    <option value="4000000">฿ 4,000,000</option>
                                    <option value="5000000">฿ 5,000,000</option>
                                    <option value="6000000">฿ 6,000,000</option>
                                    <option value="7000000">฿ 7,000,000</option>
                                    <option value="8000000">฿ 8,000,000</option>
                                    <option value="9000000">฿ 9,000,000</option>
                                    <option value="10000000">฿ 10,000,000</option>
                                    <option value="15000000">฿ 15,000,000</option>
                                    <option value="20000000">฿ 20,000,000</option>
                                    <option value="25000000">฿ 25,000,000</option>
                                    <option value="30000000">฿ 30,000,000</option>
                                    <option value="40000000">฿ 40,000,000</option>
                                    <option value="50000000">฿ 50,000,000</option>
                                    <option value="75000000">฿ 75,000,000</option>
                                    <option value="100000000">฿ 100,000,000</option>
                                </select>
                            </label>
                        </div>
                        <div class="flex items-center justify-end gap-2">
                            <button type="button" class="btn-secondary px-3 py-1 text-xs" data-filter-clear="price">Clear</button>
                            <button type="button" class="btn px-3 py-1 text-xs" data-filter-apply>Apply</button>
                        </div>
                    </div>
                </div>

                <div id="filter-popover-bedrooms" data-filter-popover="bedrooms" hidden class="space-y-4 rounded-2xl border border-border bg-popover p-5 shadow-lg" role="dialog" aria-modal="false" aria-labelledby="filter-popover-bedrooms-title">
                    <div class="flex items-center justify-between">
                        <h3 id="filter-popover-bedrooms-title" class="text-sm font-semibold text-foreground">Bedrooms</h3>
                        <button type="button" class="inline-flex size-8 items-center justify-center rounded-full border border-border bg-secondary/60 text-muted-foreground transition hover:text-foreground" data-filter-close>
                            <i class="bi bi-x-lg text-xs"></i>
                            <span class="sr-only">Close bedroom filter</span>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                            <label class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Minimum</span>
                                <select name="min_number_of_bedroom" class="input" data-filter-input>
                                    <option value="">Any</option>
                                    <option value="1">1 bedroom</option>
                                    <option value="2">2 bedrooms</option>
                                    <option value="3">3 bedrooms</option>
                                    <option value="4">4 bedrooms</option>
                                    <option value="5">5 bedrooms</option>
                                    <option value="6">6 bedrooms</option>
                                    <option value="7">7 bedrooms</option>
                                    <option value="8">8 bedrooms</option>
                                    <option value="9">9 bedrooms</option>
                                    <option value="10">10+ bedrooms</option>
                                </select>
                            </label>
                            <label class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Maximum</span>
                                <select name="max_number_of_bedroom" class="input" data-filter-input>
                                    <option value="">Any</option>
                                    <option value="1">1 bedroom</option>
                                    <option value="2">2 bedrooms</option>
                                    <option value="3">3 bedrooms</option>
                                    <option value="4">4 bedrooms</option>
                                    <option value="5">5 bedrooms</option>
                                    <option value="6">6 bedrooms</option>
                                    <option value="7">7 bedrooms</option>
                                    <option value="8">8 bedrooms</option>
                                    <option value="9">9 bedrooms</option>
                                    <option value="10">10+ bedrooms</option>
                                </select>
                            </label>
                        </div>
                        <div class="flex items-center justify-end gap-2">
                            <button type="button" class="btn-secondary px-3 py-1 text-xs" data-filter-clear="bedrooms">Clear</button>
                            <button type="button" class="btn px-3 py-1 text-xs" data-filter-apply>Apply</button>
                        </div>
                    </div>
                </div>

                <div id="filter-popover-property-type" data-filter-popover="property-type" hidden class="space-y-4 rounded-2xl border border-border bg-popover p-5 shadow-lg" role="dialog" aria-modal="false" aria-labelledby="filter-popover-property-type-title">
                    <div class="flex items-center justify-between">
                        <h3 id="filter-popover-property-type-title" class="text-sm font-semibold text-foreground">Property type</h3>
                        <button type="button" class="inline-flex size-8 items-center justify-center rounded-full border border-border bg-secondary/60 text-muted-foreground transition hover:text-foreground" data-filter-close>
                            <i class="bi bi-x-lg text-xs"></i>
                            <span class="sr-only">Close property type filter</span>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3 rounded-xl border border-border bg-secondary/40 px-3 py-2 text-sm">
                            <div class="flex items-center gap-2">
                                <input type="radio" name="building__type" value="residence" id="filter-type-residence" class="size-4 border-border text-primary focus:ring-primary/40" data-filter-input>
                                <label for="filter-type-residence" class="cursor-pointer">Residential</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="radio" name="building__type" value="commercial" id="filter-type-commercial" class="size-4 border-border text-primary focus:ring-primary/40" data-filter-input>
                                <label for="filter-type-commercial" class="cursor-pointer">Commercial</label>
                            </div>
                        </div>
                        <div class="space-y-3" data-filter-subtype-list>
                            <!-- Sub-type checkboxes inserted dynamically -->
                        </div>
                        <div class="flex items-center justify-end gap-2">
                            <button type="button" class="btn-secondary px-3 py-1 text-xs" data-filter-clear="property-type">Clear</button>
                            <button type="button" class="btn px-3 py-1 text-xs" data-filter-apply>Apply</button>
                        </div>
                    </div>
                </div>
            </div>

            <div data-filter-modal hidden class="fixed inset-0 z-50 hidden items-center justify-center px-4" role="dialog" aria-modal="true" aria-labelledby="filter-modal-title">
                <div class="absolute inset-0 bg-black/60" data-filter-close aria-hidden="true"></div>
                <div class="relative z-10 w-full max-w-4xl space-y-6 overflow-hidden rounded-2xl border border-border bg-card p-6 shadow-2xl" tabindex="-1">
                    <div class="flex items-center justify-between">
                        <h2 id="filter-modal-title" class="text-lg font-semibold text-foreground">More filters</h2>
                        <button type="button" class="inline-flex size-9 items-center justify-center rounded-full border border-border bg-secondary/60 text-muted-foreground transition hover:text-foreground" data-filter-close>
                            <i class="bi bi-x-lg text-sm"></i>
                            <span class="sr-only">Close filters</span>
                        </button>
                    </div>
                    <div class="max-h-[70vh] overflow-y-auto pr-2">
                        <div class="grid gap-6 md:grid-cols-2">
                            <label class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Unit area (sqm)</span>
                                <div class="grid grid-cols-2 gap-3">
                                    <select name="min_unit_area" class="input" data-filter-input>
                                        <option value="">Min</option>
                                        <option value="50">50</option>
                                        <option value="100">100</option>
                                        <option value="150">150</option>
                                        <option value="200">200</option>
                                        <option value="250">250</option>
                                        <option value="300">300</option>
                                        <option value="400">400</option>
                                        <option value="500">500</option>
                                    </select>
                                    <select name="max_unit_area" class="input" data-filter-input>
                                        <option value="">Max</option>
                                        <option value="100">100</option>
                                        <option value="150">150</option>
                                        <option value="200">200</option>
                                        <option value="250">250</option>
                                        <option value="300">300</option>
                                        <option value="400">400</option>
                                        <option value="500">500</option>
                                        <option value="600">600</option>
                                        <option value="700">700</option>
                                    </select>
                                </div>
                            </label>

                            <label class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Bathrooms</span>
                                <select name="number_of_bathroom" class="input" data-filter-input>
                                    <option value="">Any</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4+</option>
                                </select>
                            </label>

                            <div class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Quota</span>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__quota" value="thai">Thai</button>
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__quota" value="foreign">Foreign</button>
                            </div>
                        </div>
    
                            <div class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Furnishing</span>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__furnishing" value="partly">Partly</button>
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__furnishing" value="fully">Fully</button>
                            </div>
                        </div>

                            <div class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Ownership</span>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__have_freehold" value="true">Freehold</button>
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__have_leasehold" value="true">Leasehold</button>
                            </div>
                        </div>

                            <div class="space-y-2 text-sm font-medium text-muted-foreground">
                                <span>Development status</span>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__status" value="to_be_commenced">To be commenced</button>
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__status" value="under_construction">Under construction</button>
                                    <button type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-secondary/60 px-3 py-1 text-xs font-medium text-muted-foreground transition hover:border-primary/60 hover:text-primary" data-filter-toggle name="building__status" value="completed">Completed</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between gap-3">
                        <button type="button" class="btn-secondary" data-filter-reset>Clear all</button>
                        <button type="button" class="btn" data-filter-apply>Show results</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
