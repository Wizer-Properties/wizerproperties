{% extends "base.html" %}
{% load static %}
{% load widget_tweaks %}

{% block extend_head %}
<title>Saved properties</title>
<link rel="stylesheet" href="{% static 'css/libraries/splide.min.css' %}?v=2.0" />
{% endblock extend_head %}





{% block content %}

<section class="bg-muted/40 py-12">
    <div class="container">
        <div class="space-y-8">
            <h1 class="text-3xl font-heading font-semibold text-foreground">Your Saved Properties</h1>
            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4" id="favorite-list">
                <!-- Property cards loaded by JS -->
            </div>
        </div>
    </div>
</section>

{% include "components/property/card.html" %}

{% endblock %}




{% block extend_script %}
<script>
    var favorite_removable = true;
    var CSRF_TOKEN = '{{ csrf_token }}';
    var USER_ID = '{{ user.id }}';
</script>
<script src="{% static 'js/libraries/splide.min.js' %}"></script>
<script src="{% static 'js/property/card-factory.js' %}?v=1.00"></script>
<script src="{% static '/js/property/compair-favorite.js' %}?v=1.00"></script>
<script src="{% static 'js/favorite-list.js' %}?v=1.00"></script>
{% endblock extend_script %}
